<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Beranda - CleanWash Laundry</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </head>

  <style>
    /* === CSS PENJINAK BOOTSTRAP UNTUK NAVBAR LAMA === */
    header .nav-links {
      display: flex !important;
      list-style: none !important;
      padding-left: 0 !important;
      margin-bottom: 0 !important;
    }

    header .nav-links li {
      margin: 0 !important;
      padding: 0 !important;
    }

    header .nav-links a {
      text-decoration: none !important;
      display: inline-block !important;
    }

    /* === STYLING CUSTOM UNTUK HALAMAN LOGIN === */
    :root {
      --primary-clean: #49b1c8;
      --secondary-wash: #49b1c8;
    }

    body {
      background-color: #f1f3f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Memaksa area main mengisi ruang kosong agar footer tetap di bawah */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }

    .login-container {
      max-width: 450px;
      width: 100%;
    }

    .login-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(
        135deg,
        var(--primary-clean),
        var(--secondary-wash)
      );
      color: white;
      padding: 30px text-center;
    }

    .btn-login {
      background: linear-gradient(
        135deg,
        var(--primary-clean),
        var(--secondary-wash)
      );
      color: white;
      border: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-login:hover {
      opacity: 0.9;
      color: white;
    }

    /* Style tambahan untuk link daftar */
    .register-link {
      color: var(--secondary-wash);
      text-decoration: none;
      font-weight: 600;
    }

    .register-link:hover {
      text-decoration: underline;
    }
  </style>

  <body>
    <header>
      <nav class="nav">
        <div class="logo">
          <span class="gradient-text">CleanWash</span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Beranda</a></li>
          <li><a href="tentang_kami.html">Tentang Kami</a></li>
          <li><a href="harga.html">Daftar Harga</a></li>
          <li><a href="paket.html">Paket Langganan</a></li>
          <li><a href="keranjang.html">Pemesanan</a></li>
          <li><a href="galeri.html">Galeri</a></li>
          <li>
            <a href="riwayat-order.html">Riwayat</a>
          </li>
          <li><a href="kontak.html">Hubungi Kami</a></li>
          <li><a href="login.html">Log In</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <div class="login-container">
        <div class="card login-card shadow">
          <div class="login-header text-center py-4">
            <h3 class="fw-bold mb-0">Selamat Datang</h3>
            <p class="small mb-0 text-white-50">
              Silakan masuk ke akun CleanWash Anda
            </p>
          </div>
          <div class="card-body p-4 p-md-5">
            <form action="#" id="formLogin" method="POST">
              <!-- Input Email menggunakan Bootstrap Floating Labels -->
              <div class="form-floating mb-3">
                <input
                  type="username"
                  class="form-control"
                  id="loginEmail"
                  placeholder="Masukkan username Anda"
                  required
                />
                <label for="loginEmail">Username</label>
              </div>

              <!-- Input Password menggunakan Bootstrap Floating Labels -->
              <div class="position-relative mb-3">
                <div class="form-floating">
                  <input
                    type="password"
                    class="form-control pe-5"
                    id="loginPassword"
                    placeholder="Password"
                    required
                  />
                  <label for="loginPassword">Kata Sandi</label>
                </div>
                <button
                  type="button"
                  id="togglePassword"
                  class="btn position-absolute top-50 end-0 translate-middle-y me-3 text-secondary border-0 bg-transparent"
                  style="z-index: 10"
                >
                  <i class="fa-regular fa-eye" id="eyeIcon"></i>
                </button>
              </div>

              <!-- Fitur Ingat Saya & Lupa Password -->
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="rememberMe"
                  />
                  <label
                    class="form-check-label text-secondary small"
                    for="rememberMe"
                  >
                    Ingat Saya
                  </label>
                </div>
                <a href="#" class="small text-decoration-none text-muted"
                  >Lupa Sandi?</a
                >
              </div>

              <!-- Tombol Login -->
              <button
                type="submit"
                class="btn btn-login w-100 py-2.5 rounded-3 mb-3"
              >
                Masuk Sekarang
              </button>

              <!-- Link untuk Register -->
              <div class="text-center">
                <p class="small text-secondary mb-0">
                  Belum punya akun?
                  <a href="register.html" class="register-link"
                    >Daftar di sini</a
                  >
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </body>

  <script src="app.js"></script>
  <script>
    document
      .getElementById("togglePassword")
      .addEventListener("click", function () {
        const passwordInput = document.getElementById("loginPassword");
        const eyeIcon = document.getElementById("eyeIcon");

        // Cek tipe input saat ini
        if (passwordInput.type === "password") {
          // Ubah jadi text agar password kelihatan
          passwordInput.type = "text";
          // Ubah ikon mata menjadi mata dicoret
          eyeIcon.classList.remove("fa-eye");
          eyeIcon.classList.add("fa-eye-slash");
        } else {
          // Kembalikan jadi password agar disembunyikan
          passwordInput.type = "password";
          // Kembalikan ikon mata biasa
          eyeIcon.classList.remove("fa-eye-slash");
          eyeIcon.classList.add("fa-eye");
        }
      });
    document
      .getElementById("formLogin")
      .addEventListener("submit", function (event) {
        event.preventDefault();

        // 1. Ambil input dari form
        const usernameInput = document.getElementById("loginEmail").value;
        const passwordInput = document.getElementById("loginPassword").value;

        // 2. Data akun bawaan tim (Default Admin)
        const defaultUser = "admin";
        const defaultPass = "123456";

        // 3. Ambil data dari hasil register
        const registeredUser = localStorage.getItem("storedUsername");
        const registeredPass = localStorage.getItem("storedPassword");

        // 4. Cek Logika
        if (usernameInput === defaultUser && passwordInput === defaultPass) {
          localStorage.setItem("isLoggedIn", "true");
          alert("Login Berhasil! Selamat datang Admin CleanWash.");
          window.location.href = "keranjang.html";
        } else if (
          registeredUser &&
          usernameInput === registeredUser &&
          passwordInput === registeredPass
        ) {
          localStorage.setItem("isLoggedIn", "true");
          alert(
            "Login Berhasil! Selamat datang @" +
              registeredUser +
              " di CleanWash.",
          );
          window.location.href = "keranjang.html";
        } else {
          alert("Login Gagal! Username atau kata sandi salah.");
        }
      });
  </script>
</html>
