<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Beranda - CleanWash Laundry</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  </head>

  <style>
    /* === CSS PENJINAK BOOTSTRAP UNTUK NAVBAR LAMA === */
    header .nav-links {
      display: flex !important;
      list-style: none !important;
      padding-left: 0 !important;
      margin-bottom: 0 !important;
    }

    header .nav-links li {
      margin: 0 !important;
      padding: 0 !important;
    }

    header .nav-links a {
      text-decoration: none !important;
      display: inline-block !important;
    }

    /* === STYLING CUSTOM UNTUK HALAMAN REGISTER === */
    :root {
      --primary-clean: #49b1c8;
      --secondary-wash: #49b1c8;
    }

    body {
      background-color: #f1f3f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Memaksa area main mengisi ruang kosong agar footer tetap di bawah */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }

    .register-container {
      max-width: 500px;
      width: 100%;
    }

    .register-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
    }

    .register-header {
      background: linear-gradient(
        135deg,
        var(--primary-clean),
        var(--secondary-wash)
      );
      color: white;
      padding: 25px text-center;
    }

    .btn-register {
      background: linear-gradient(
        135deg,
        var(--primary-clean),
        var(--secondary-wash)
      );
      color: white;
      border: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-register:hover {
      opacity: 0.9;
      color: white;
    }

    .login-link {
      color: var(--primary-clean);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link:hover {
      text-decoration: underline;
    }
  </style>

  <body>
    <header>
      <nav class="nav">
        <div class="logo">
          <span class="gradient-text">CleanWash</span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Beranda</a></li>
          <li><a href="tentang_kami.html">Tentang Kami</a></li>
          <li><a href="harga.html">Daftar Harga</a></li>
          <li><a href="paket.html">Paket Langganan</a></li>
          <li><a href="keranjang.html">Pemesanan</a></li>
          <li><a href="galeri.html">Galeri</a></li>
          <li><a href="kontak.html">Hubungi Kami</a></li>
          <li><a href="login.html" class="active">Masuk / Daftar</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <div class="register-container">
        <div class="card register-card shadow">
          <div class="register-header text-center text-white py-4">
            <h3 class="fw-bold mb-0">Buat Akun Baru</h3>
            <p class="small mb-0 text-white-50">
              Bergabung dengan CleanWash untuk kemudahan laundry
            </p>
          </div>
          <div class="card-body p-4 p-md-5">
            <form action="#" id="formRegister" method="POST">
              <!-- Input Nama Lengkap -->
              <div class="form-floating mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="regName"
                  placeholder="Nama Lengkap"
                  required
                />
                <label for="regName">Username</label>
              </div>

              <!-- Input Nomor WhatsApp -->
              <!-- <div class="form-floating mb-3">
                            <input type="tel" class="form-control" id="regPhone" placeholder="Nomor WhatsApp" required>
                            <label for="regPhone">Nomor WhatsApp (Aktif)</label>
                        </div> -->

              <!-- Input Email -->
              <!-- <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="regEmail" placeholder="name@example.com"
                                required>
                            <label for="regEmail">Alamat Email</label>
                        </div> -->

              <!-- Input Password -->
              <div class="position-relative mb-3">
                <div class="form-floating">
                  <input
                    type="password"
                    class="form-control pe-5"
                    id="regPassword"
                    placeholder="Password"
                    required
                  />
                  <label for="regPassword">Kata Sandi</label>
                </div>
                <button
                  type="button"
                  id="togglePassword"
                  class="btn position-absolute top-50 end-0 translate-middle-y me-3 text-secondary border-0 bg-transparent"
                  style="z-index: 10"
                >
                  <i class="fa-regular fa-eye" id="eyeIcon"></i>
                </button>
              </div>

              <!-- Input Konfirmasi Password -->
              <div class="position-relative mb-3">
                <div class="form-floating">
                  <input
                    type="password"
                    class="form-control pe-5"
                    id="regPasswordConfirm"
                    placeholder="Password"
                    required
                  />
                  <label for="regPasswordConfirm">Konfirmasi Kata Sandi</label>
                </div>
                <button
                  type="button"
                  id="togglePasswords"
                  class="btn position-absolute top-50 end-0 translate-middle-y me-3 text-secondary border-0 bg-transparent"
                  style="z-index: 10"
                >
                  <i class="fa-regular fa-eye" id="eyeIconConfirm"></i>
                </button>
              </div>

              <!-- Syarat & Ketentuan -->
              <div class="form-check mb-4">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="termsCheck"
                  required
                />
                <label
                  class="form-check-label text-secondary small"
                  for="termsCheck"
                >
                  Saya menyetujui semua Syarat & Ketentuan yang berlaku di
                  CleanWash.
                </label>
              </div>

              <!-- Tombol Register -->
              <button
                type="submit"
                class="btn btn-register w-100 py-2.5 rounded-3 mb-3"
              >
                Daftar Sekarang
              </button>

              <!-- Link Kembali ke Login -->
              <div class="text-center">
                <p class="small text-secondary mb-0">
                  Sudah punya akun?
                  <a href="login.html" class="login-link">Masuk di sini</a>
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </body>

  <script src="app.js"></script>
  <script>
    // Fitur Show/Hide Password Pertama
    document
      .getElementById("togglePassword")
      .addEventListener("click", function () {
        const passwordInput = document.getElementById("regPassword");
        const eyeIcon = document.getElementById("eyeIcon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          passwordInput.type = "password";
          eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
        }
      });

    // Fitur Show/Hide Password Konfirmasi
    document
      .getElementById("togglePasswords")
      .addEventListener("click", function () {
        const confirmInput = document.getElementById("regPasswordConfirm");
        const eyeIconConfirm = document.getElementById("eyeIconConfirm");

        if (confirmInput.type === "password") {
          confirmInput.type = "text";
          eyeIconConfirm.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          confirmInput.type = "password";
          eyeIconConfirm.classList.replace("fa-eye-slash", "fa-eye");
        }
      });
    document
      .getElementById("formRegister")
      .addEventListener("submit", function (event) {
        event.preventDefault();

        const username = document.getElementById("regName").value;
        const password = document.getElementById("regPassword").value;
        const passwordConfirm =
          document.getElementById("regPasswordConfirm").value;

        // VALIDASI: Cek apakah password dan konfirmasi password sama
        if (password !== passwordConfirm) {
          alert(
            "Pendaftaran Gagal! Kata sandi dan konfirmasi kata sandi tidak cocok.",
          );
          return; // Menghentikan proses pendaftaran
        }

        // Simpan ke storage browser jika password sudah cocok
        localStorage.setItem("storedUsername", username);
        localStorage.setItem("storedPassword", password);

        alert(
          "Pendaftaran Berhasil!\nAkun Anda telah disimpan. Silakan masuk.",
        );
        window.location.href = "login.html";
      });
  </script>
</html>
